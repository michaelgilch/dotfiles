# Disable the Shure MV7+ output sink
# The MV7+ has a headphone jack that PipeWire exposes as a sink,
# which can steal audio from the speakers when it becomes the default.

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-Shure_Inc.*"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
